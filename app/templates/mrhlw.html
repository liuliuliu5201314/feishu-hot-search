<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑料采集 - B站工具箱</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .top-nav {
            max-width: 1200px;
            margin: 0 auto 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .nav-link {
            padding: 10px 18px;
            border-radius: 999px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            background: rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.85);
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.2s;
        }
        .nav-link:hover { background: rgba(255,255,255,0.2); color: #fff; }
        .nav-link.active {
            background: #e94560;
            border-color: #e94560;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 8px;
            font-size: 30px;
        }
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.7);
            margin-bottom: 24px;
            font-size: 14px;
        }
        .card {
            background: rgba(255,255,255,0.96);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
        }
        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 14px;
            border-bottom: 1px solid #eee;
        }
        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 12px;
            background: linear-gradient(135deg, #e94560, #c23152);
            color: #fff;
        }
        .card-title { font-size: 18px; font-weight: 600; color: #333; }
        .meta-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            color: #666;
            font-size: 14px;
        }
        .meta-row strong { color: #e94560; }
        .cron-box {
            background: #f8f9fa;
            border: 1px dashed #ddd;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .cron-label {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
        }
        .cron-url {
            display: block;
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            background: #fff;
            color: #111;
            word-break: break-all;
        }
        .hint {
            margin-top: 10px;
            font-size: 13px;
            color: #888;
            line-height: 1.6;
        }
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button, .btn-link {
            padding: 12px 22px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary {
            background: linear-gradient(135deg, #e94560, #c23152);
            color: #fff;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(233,69,96,0.35); }
        .btn-secondary {
            background: #eef2f7;
            color: #444;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .tab {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            border: 2px solid #eee;
            background: #fff;
            color: #666;
        }
        .tab.active {
            background: #e94560;
            color: #fff;
            border-color: #e94560;
        }
        .article-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }
        .article-card {
            border: 1px solid #eee;
            border-radius: 14px;
            overflow: hidden;
            background: #fff;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .article-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        .cover-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 10;
            background: #f3f4f6;
            overflow: hidden;
        }
        .cover-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            color: #fff;
            background: rgba(0,0,0,0.55);
        }
        .badge.synced { background: #10b981; }
        .badge.pending { background: #f59e0b; }
        .article-body { padding: 14px; }
        .article-title {
            font-size: 15px;
            font-weight: 600;
            color: #222;
            line-height: 1.5;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .article-meta {
            font-size: 12px;
            color: #888;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        .article-link {
            font-size: 13px;
            color: #e94560;
            text-decoration: none;
            word-break: break-all;
        }
        .empty, .loading, .error, .status-msg {
            text-align: center;
            padding: 28px 16px;
            color: #666;
            font-size: 14px;
        }
        .error { color: #e74c3c; background: #fff5f5; border-radius: 10px; }
        .status-msg { text-align: left; padding: 12px 0 0; color: #666; }
        @media (max-width: 768px) {
            .actions { flex-direction: column; }
            button, .btn-link { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <a class="nav-link" href="/">B站工具箱</a>
        <a class="nav-link active" href="/mrhlw">黑料采集</a>
    </nav>

    <div class="container">
        <h1>📰 黑料采集</h1>
        <p class="subtitle">每日最新文章采集 · 飞书表格同步 · 页面实时展示</p>

        <div class="card">
            <div class="card-header">
                <div class="card-icon">⏰</div>
                <div class="card-title">定时采集</div>
            </div>
            <div class="cron-box">
                <div class="cron-label">定时任务 URL（建议每天 15:00 调用一次）</div>
                <input id="cron-url" class="cron-url" readonly>
                <p class="hint">
                    在外部定时平台新建 GET/POST 请求，填入上面的 URL 即可。<br>
                    服务内置也会在每天 15:00 自动执行；GitHub Actions 也会触发同一接口。
                </p>
            </div>
            <div class="actions">
                <button class="btn-primary" onclick="syncNow()">立即同步到表格</button>
                <button class="btn-secondary" onclick="loadArticles()">刷新列表</button>
                <a class="btn-link btn-secondary" id="table-link" target="_blank" rel="noopener">打开飞书表格</a>
            </div>
            <div class="status-msg" id="sync-status"></div>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-icon">📋</div>
                <div class="card-title">每日数据</div>
            </div>
            <div class="meta-row">
                <span>日期：<strong id="current-date">-</strong></span>
                <span>网站今日：<strong id="live-count">0</strong> 篇</span>
                <span>表格已同步：<strong id="table-count">0</strong> 篇</span>
            </div>
            <div class="tabs">
                <div class="tab active" data-view="live" onclick="switchView('live')">网站最新</div>
                <div class="tab" data-view="table" onclick="switchView('table')">表格已入库</div>
            </div>
            <div id="loading" class="loading">加载中...</div>
            <div id="error" class="error" style="display:none;"></div>
            <div id="article-grid" class="article-grid"></div>
            <div id="empty" class="empty" style="display:none;">今天还没有新文章</div>
        </div>
    </div>

    <script>
        var currentView = 'live';
        var overviewData = null;
        var tableUrl = 'https://jxxi08phou.feishu.cn/base/I3X8bToaFaTx1LswJH9c2QFHnpd?table=tblUuP2ecpsgMsBg&view=vewMK4uh5f';

        document.getElementById('cron-url').value = window.location.origin + '/api/mrhlw/sync';
        document.getElementById('table-link').href = tableUrl;

        function escapeHtml(text) {
            return String(text || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function renderCards(items, mode) {
            var grid = document.getElementById('article-grid');
            if (!items.length) {
                grid.innerHTML = '';
                document.getElementById('empty').style.display = 'block';
                return;
            }
            document.getElementById('empty').style.display = 'none';
            var html = '';
            items.forEach(function(item) {
                var cover = item.cover || 'https://via.placeholder.com/640x400?text=No+Cover';
                var badge = '';
                if (mode === 'live') {
                    badge = item.synced
                        ? '<span class="badge synced">已入库</span>'
                        : '<span class="badge pending">待同步</span>';
                }
                html += '<article class="article-card">';
                html += '<a href="' + escapeHtml(item.link) + '" target="_blank" rel="noopener">';
                html += '<div class="cover-wrap">';
                html += '<img src="' + escapeHtml(cover) + '" alt="" loading="lazy" onerror="this.src=\'https://via.placeholder.com/640x400?text=Cover\'">';
                html += badge;
                html += '</div>';
                html += '<div class="article-body">';
                html += '<div class="article-title">' + escapeHtml(item.title) + '</div>';
                html += '<div class="article-meta">';
                if (item.author) html += '作者：' + escapeHtml(item.author) + '<br>';
                if (item.categories) html += '分类：' + escapeHtml(item.categories) + '<br>';
                html += '日期：' + escapeHtml(item.publish_date || overviewData.date);
                html += '</div>';
                html += '<span class="article-link">查看原文</span>';
                html += '</div></a></article>';
            });
            grid.innerHTML = html;
        }

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.tab').forEach(function(tab) {
                tab.classList.toggle('active', tab.dataset.view === view);
            });
            if (!overviewData) return;
            if (view === 'live') {
                renderCards(overviewData.live_items || [], 'live');
            } else {
                renderCards(overviewData.table_items || [], 'table');
            }
        }

        async function loadArticles() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';
            try {
                var res = await fetch('/api/mrhlw/articles');
                var data = await res.json();
                if (data.status !== 'ok') throw new Error(data.message || '加载失败');
                overviewData = data;
                document.getElementById('current-date').textContent = data.date;
                document.getElementById('live-count').textContent = data.live_count || 0;
                document.getElementById('table-count').textContent = data.table_count || 0;
                switchView(currentView);
            } catch (e) {
                document.getElementById('error').textContent = '❌ ' + e.message;
                document.getElementById('error').style.display = 'block';
            }
            document.getElementById('loading').style.display = 'none';
        }

        async function syncNow() {
            var statusEl = document.getElementById('sync-status');
            statusEl.textContent = '同步中，请稍候...';
            try {
                var res = await fetch('/api/mrhlw/sync', { method: 'POST' });
                var data = await res.json();
                if (data.status !== 'ok') throw new Error(data.message || '同步失败');
                statusEl.textContent = data.message;
                await loadArticles();
            } catch (e) {
                statusEl.textContent = '同步失败：' + e.message;
            }
        }

        loadArticles();
    </script>
</body>
</html>
