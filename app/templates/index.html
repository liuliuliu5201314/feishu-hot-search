<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B站工具箱</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: linear-gradient(135deg, #00a1d6, #00609c); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: #fff; border-radius: 16px; padding: 40px; max-width: 800px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #00a1d6; margin-bottom: 30px; }
        .section { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .section:last-child { border-bottom: none; }
        .section-title { color: #333; font-size: 18px; margin-bottom: 15px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        input:focus { border-color: #00a1d6; outline: none; }
        button { padding: 12px 24px; background: #00a1d6; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:hover { background: #0088c6; }
        .result { margin-top: 20px; padding: 20px; background: #f5f5f5; border-radius: 8px; display: none; }
        .result h3 { color: #333; margin-bottom: 10px; font-size: 16px; }
        .result pre { white-space: pre-wrap; word-break: break-all; font-size: 14px; line-height: 1.6; max-height: 400px; overflow-y: auto; background: #fff; padding: 15px; border-radius: 8px; }
        .error { color: #e74c3c; text-align: center; margin-top: 20px; display: none; }
        .loading { text-align: center; display: none; margin-top: 20px; color: #666; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 10px; background: #00a1d6; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
        .btn:hover { background: #0088c6; }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #5a6268; }
        .hot-list { max-height: 500px; overflow-y: auto; }
        .hot-item { display: flex; align-items: center; padding: 12px 10px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.2s; }
        .hot-item:hover { background: #f5f8ff; }
        .hot-rank { width: 28px; height: 28px; background: #00a1d6; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; margin-right: 12px; flex-shrink: 0; }
        .hot-rank.top3 { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }
        .hot-rank.top10 { background: linear-gradient(135deg, #ffa502, #ff6348); }
        .hot-info { flex: 1; }
        .hot-keyword { font-size: 15px; color: #333; font-weight: 500; }
        .hot-heat { font-size: 12px; color: #999; margin-top: 3px; }
        .hot-heat span { color: #ff6b6b; font-weight: bold; }
        .refresh-btn { margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>B站工具箱</h1>
        
        <div class="section">
            <h2 class="section-title">字幕提取</h2>
            <div class="input-group">
                <input type="text" id="bvid" placeholder="输入BV号，如 BV1DQ7k6JE4P">
                <button onclick="fetchSubtitle()">提取</button>
            </div>
            <div class="loading" id="loading">正在提取...</div>
            <div class="error" id="error"></div>
            <div class="result" id="result">
                <h3 id="title"></h3>
                <pre id="subtitle"></pre>
                <div class="btn-group">
                    <button class="btn" onclick="pushToFeishu()">推送到飞书</button>
                    <button class="btn btn-secondary" onclick="saveToBase()">保存到表格</button>
                </div>
            </div>
        </div>
        
        <div class="section">
            <h2 class="section-title">哔哩哔哩热搜词</h2>
            <div id="hot-loading" class="loading">加载中...</div>
            <div id="hot-error" class="error"></div>
            <div id="hot-list" class="hot-list"></div>
            <button class="refresh-btn" onclick="fetchHotList()">刷新热搜</button>
        </div>
    </div>
    
    <script>
        var currentData = null;
        
        async function fetchSubtitle() {
            var bvid = document.getElementById('bvid').value.trim();
            if (!bvid) { alert('请输入BV号'); return; }
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';
            document.getElementById('result').style.display = 'none';
            try {
                var res = await fetch('/api/subtitle?bvid=' + encodeURIComponent(bvid));
                var data = await res.json();
                if (data.error) { throw new Error(data.error); }
                currentData = data;
                document.getElementById('title').textContent = data.title + ' - ' + data.author;
                document.getElementById('subtitle').textContent = data.subtitle;
                document.getElementById('result').style.display = 'block';
            } catch (e) {
                document.getElementById('error').textContent = '错误: ' + e.message;
                document.getElementById('error').style.display = 'block';
            }
            document.getElementById('loading').style.display = 'none';
        }
        
        async function pushToFeishu() {
            if (!currentData) return;
            var bvid = document.getElementById('bvid').value.trim();
            var res = await fetch('/api/push', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({bvid:bvid, title:currentData.title, author:currentData.author, subtitle:currentData.subtitle})});
            var data = await res.json();
            alert(data.message);
        }
        
        async function saveToBase() {
            if (!currentData) return;
            var bvid = document.getElementById('bvid').value.trim();
            var res = await fetch('/api/save', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({bvid:bvid, title:currentData.title, subtitle:currentData.subtitle})});
            var data = await res.json();
            alert(data.message);
        }
        
        async function fetchHotList() {
            document.getElementById('hot-loading').style.display = 'block';
            document.getElementById('hot-error').style.display = 'none';
            document.getElementById('hot-list').innerHTML = '';
            
            try {
                var res = await fetch('/api/hot');
                var data = await res.json();
                
                if (data.status === 'error') {
                    throw new Error(data.message);
                }
                
                var html = '';
                data.data.forEach(function(item) {
                    var rankClass = item.rank <= 3 ? 'hot-rank top3' : (item.rank <= 10 ? 'hot-rank top10' : 'hot-rank');
                    html += '<div class="hot-item" onclick="searchKeyword(\'' + item.keyword + '\')">';
                    html += '<div class="' + rankClass + '">' + item.rank + '</div>';
                    html += '<div class="hot-info">';
                    html += '<div class="hot-keyword">' + item.keyword + '</div>';
                    html += '<div class="hot-heat">热度: <span>' + formatHeat(item.heat) + '</span></div>';
                    html += '</div>';
                    html += '</div>';
                });
                
                document.getElementById('hot-list').innerHTML = html;
            } catch (e) {
                document.getElementById('hot-error').textContent = '错误: ' + e.message;
                document.getElementById('hot-error').style.display = 'block';
            }
            
            document.getElementById('hot-loading').style.display = 'none';
        }
        
        function formatHeat(num) {
            if (num >= 10000) {
                return (num / 10000).toFixed(1) + '万';
            }
            return num;
        }
        
        function searchKeyword(keyword) {
            window.open('https://search.bilibili.com/all?keyword=' + encodeURIComponent(keyword), '_blank');
        }
        
        fetchHotList();
    </script>
</body>
</html>
